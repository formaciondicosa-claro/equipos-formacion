<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Control de Equipos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">

  <div class="max-w-4xl mx-auto px-4 py-6">

    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-xl font-bold">📦 Control de Equipos</h1>
        <p class="text-xs text-slate-400">Mini app para solicitudes y control de préstamos</p>
      </div>

      <div id="user-info" class="hidden text-right text-xs text-slate-400">
        <div id="user-email"></div>
        <button id="logout-btn" class="mt-1 text-amber-400 underline">Cerrar sesión</button>
      </div>
    </header>

    <!-- LOGIN -->
    <section id="login-view" class="mt-10">
      <div class="bg-slate-900 p-6 rounded-2xl shadow-xl border border-slate-700 text-center">
        <p class="text-sm mb-4 text-slate-300">
          Inicia sesión con tu cuenta de Google.
        </p>
        <button id="login-btn"
          class="px-4 py-2 bg-sky-600 rounded-full hover:bg-sky-500 text-sm">
          Iniciar sesión con Google
        </button>
      </div>
    </section>

    <!-- FORMADOR -->
    <section id="formador-view" class="hidden space-y-6">

      <div class="bg-slate-900 border border-slate-700 rounded-xl p-4">
        <h2 class="text-sm font-semibold mb-2">Nueva solicitud</h2>

        <label class="block text-xs mb-1">Formador</label>
        <select id="formador-select"
          class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-xs mb-2"></select>

        <label class="block text-xs mb-1">Tipo de equipo</label>
        <select id="tipo-equipo-form"
          class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-xs"></select>

        <label class="block text-xs mb-1 mt-2">Equipo</label>
        <select id="equipo-form"
          class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-xs"></select>

        <label class="block text-xs mb-1 mt-2">Fecha de uso</label>
        <input id="fecha-uso" type="date"
          class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-xs">

        <label class="block text-xs mb-1 mt-2">Motivo</label>
        <input id="motivo" type="text"
          class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1 text-xs">

        <button id="btn-enviar-solicitud"
          class="w-full mt-3 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-full text-xs">
          Enviar solicitud
        </button>

        <div id="formador-status" class="text-[11px] mt-2"></div>
      </div>

      <div class="bg-slate-900 border border-slate-700 rounded-xl p-4">
        <h2 class="text-sm font-semibold mb-2">Mis solicitudes</h2>
        <div id="mis-solicitudes" class="space-y-2"></div>
      </div>

    </section>

    <!-- ADMIN -->
    <section id="admin-view" class="hidden space-y-5">

      <div class="bg-slate-900 border border-slate-700 rounded-xl p-4">
        <h2 class="text-sm font-semibold mb-2">Solicitudes pendientes</h2>
        <div id="lista-pendientes" class="space-y-2"></div>
      </div>

      <div class="bg-slate-900 border border-slate-700 rounded-xl p-4">
        <h2 class="text-sm font-semibold mb-2">Equipos prestados</h2>
        <div id="lista-prestados" class="space-y-2"></div>
      </div>

      <!-- LISTA EQUIPOS + BOTÓN LIMPIAR DUPLICADOS -->
      <div class="bg-slate-900 border border-slate-700 rounded-xl p-4">
        <div class="flex justify-between items-center mb-2">
          <h2 class="text-sm font-semibold">Equipos registrados</h2>
          <button onclick="window.limpiarDuplicados()"
            class="text-[11px] px-2 py-1 bg-purple-600 hover:bg-purple-500 rounded-full">
            Limpiar duplicados
          </button>
        </div>

        <div id="lista-equipos" class="space-y-1 text-xs"></div>
      </div>

    </section>
  </div>

  <!-- FIREBASE SDK MODULAR -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      collection,
      getDocs,
      addDoc,
      onSnapshot,
      updateDoc,
      deleteDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBCLna-fGM4c7cpUcHnZzUY01Jfkk22u3A",
      authDomain: "equipos-de-formacion.firebaseapp.com",
      projectId: "equipos-de-formacion",
      storageBucket: "equipos-de-formacion.appspot.com",
      messagingSenderId: "249416438280",
      appId: "1:249416438280:web:be76d25b13c7763abcb7bd",
      measurementId: "G-TTJ1WJNZ2N"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = "formaciondicosa@gmail.com";

    const FORMADORES = [
      { nombre: "Duber Herney Muñoz Ramos", email: "duber.munoz@dico.com.co" },
      { nombre: "Jose Daniel Rubiano Rodriguez", email: "jose.rubiano@dico.com.co" },
      { nombre: "Miguel Oswaldo Gonzalez Castaño", email: "miguel.gonzalez@dico.com.co" },
      { nombre: "Sebastian David Merchán Junca", email: "sebastian.merchan@dico.com.co" },
      { nombre: "Nestor Jair Basante Apraez", email: "jair.basante@dico.com.co" },
      { nombre: "Andres Felipe Tarazona", email: "andres.tarazon@dico.com.co" },
      { nombre: "Juan Felipe Villamil Torres", email: "juan.villamil@dico.com.co" }
    ];

    const EQUIPOS_SEMILLA = [
      { tipo: "Medidor de campo", nombre: "Trilithic 360 Dsp", serie: "360624417" },
      { tipo: "Decodificador", nombre: "Smart speaker", serie: "1" },
      { tipo: "Decodificador", nombre: "Claro box", serie: "D4CFF998DF9" },
      { tipo: "Mesh router", nombre: "Mesh newland", serie: "810325160052873" },
      { tipo: "Mesh router", nombre: "Mesh newland", serie: "810325160053523" },
      { tipo: "Mesh router", nombre: "Mesh newland", serie: "810325160052734" }
    ];

    // ---------------------
    // UI REFERENCES
    // ---------------------
    const loginView = document.getElementById("login-view");
    const formadorView = document.getElementById("formador-view");
    const adminView = document.getElementById("admin-view");

    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const userEmailEl = document.getElementById("user-email");
    const userInfo = document.getElementById("user-info");

    const formadorSelect = document.getElementById("formador-select");
    const tipoEquipoForm = document.getElementById("tipo-equipo-form");
    const equipoForm = document.getElementById("equipo-form");
    const fechaUso = document.getElementById("fecha-uso");
    const motivo = document.getElementById("motivo");
    const formadorStatus = document.getElementById("formador-status");
    const btnEnviar = document.getElementById("btn-enviar-solicitud");
    const misSolicitudes = document.getElementById("mis-solicitudes");

    const listaPendientes = document.getElementById("lista-pendientes");
    const listaPrestados = document.getElementById("lista-prestados");
    const listaEquipos = document.getElementById("lista-equipos");

    // ---------------------
    // LOGIN
    // ---------------------
    loginBtn.onclick = () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider).catch(e => console.error(e));
    };

    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {

      if (!user) {
        loginView.classList.remove("hidden");
        adminView.classList.add("hidden");
        formadorView.classList.add("hidden");
        userInfo.classList.add("hidden");
        return;
      }

      loginView.classList.add("hidden");
      userInfo.classList.remove("hidden");
      userEmailEl.textContent = user.email;

      await asegurarEquipos();

      if (user.email === ADMIN_EMAIL) {
        adminView.classList.remove("hidden");
        formadorView.classList.add("hidden");
        iniciarAdmin();
      } else {
        formadorView.classList.remove("hidden");
        adminView.classList.add("hidden");
        iniciarFormador();
      }
    });

    async function asegurarEquipos() {
      const snap = await getDocs(collection(db, "equipos"));
      if (snap.empty) {
        for (const eq of EQUIPOS_SEMILLA) {
          await addDoc(collection(db, "equipos"), {
            ...eq,
            estado: "disponible"
          });
        }
      }
    }

    // ---------------------
    // FORMADOR
    // ---------------------
    let cacheEquipos = [];

    async function iniciarFormador() {

      formadorSelect.innerHTML = "";
      FORMADORES.forEach(f => {
        const op = document.createElement("option");
        op.value = f.nombre;
        op.textContent = f.nombre;
        formadorSelect.appendChild(op);
      });

      const snap = await getDocs(collection(db, "equipos"));
      cacheEquipos = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      const tipos = [...new Set(cacheEquipos.map(e => e.tipo))];
      tipoEquipoForm.innerHTML = "";
      tipos.forEach(t => {
        const op = document.createElement("option");
        op.value = t;
        op.textContent = t;
        tipoEquipoForm.appendChild(op);
      });

      tipoEquipoForm.onchange = llenarEquipos;
      llenarEquipos();

      escucharSolicitudesFormador();
    }

    function llenarEquipos() {
      const tipo = tipoEquipoForm.value;
      equipoForm.innerHTML = "";

      cacheEquipos
        .filter(e => e.tipo === tipo && e.estado !== "prestado")
        .forEach(e => {
          const op = document.createElement("option");
          op.value = e.id;
          op.textContent = `${e.nombre} (${e.serie})`;
          equipoForm.appendChild(op);
        });
    }

    btnEnviar.onclick = async () => {
      const user = auth.currentUser;
      if (!user) return;

      if (!equipoForm.value || !fechaUso.value || !motivo.value.trim()) {
        formadorStatus.textContent = "Completa todos los campos.";
        formadorStatus.className = "text-[11px] text-amber-400";
        return;
      }

      await addDoc(collection(db, "solicitudes"), {
        equipoId: equipoForm.value,
        formadorNombre: formadorSelect.value,
        formadorEmail: user.email,
        fechaUso: fechaUso.value,
        motivo: motivo.value.trim(),
        estado: "pendiente",
        fechaSolicitud: new Date()
      });

      formadorStatus.textContent = "Solicitud enviada.";
      formadorStatus.className = "text-[11px] text-emerald-400";
      motivo.value = "";
    };

    function escucharSolicitudesFormador() {
      const user = auth.currentUser;
      onSnapshot(collection(db, "solicitudes"), (snap) => {
        misSolicitudes.innerHTML = "";
        snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(s => s.formadorEmail === user.email)
          .forEach(s => {
            const div = document.createElement("div");
            div.className = "border border-slate-700 rounded px-4 py-2";

            div.innerHTML = `
              <div class="font-medium">${s.motivo}</div>
              <div class="text-[11px] text-slate-400">
                Uso: ${s.fechaUso} • Estado: ${s.estado}
              </div>
            `;

            misSolicitudes.appendChild(div);
          });
      });
    }

    // ---------------------
    // ADMIN
    // ---------------------
    function iniciarAdmin() {
      escucharSolicitudesAdmin();
      escucharEquiposAdmin();
    }

    function escucharSolicitudesAdmin() {
      onSnapshot(collection(db, "solicitudes"), (snap) => {
        listaPendientes.innerHTML = "";
        listaPrestados.innerHTML = "";

        snap.docs.forEach(d => {
          const s = { id: d.id, ...d.data() };

          if (s.estado === "pendiente") {
            const div = document.createElement("div");

            div.className = "border border-slate-700 rounded px-3 py-2";

            div.innerHTML = `
              <div class="font-medium">${s.motivo}</div>
              <div class="text-[11px] text-slate-400">
                ${s.formadorNombre} (${s.formadorEmail})
              </div>
              <button class="w-full mt-2 py-1 bg-sky-600 rounded-full text-xs"
                onclick="window.aprobarSolicitud('${s.id}','${s.equipoId}')">
                Entregar
              </button>
            `;

            listaPendientes.appendChild(div);
          }

          if (s.estado === "entregado") {
            const div = document.createElement("div");

            div.className = "border border-slate-700 rounded px-3 py-2 flex justify-between";

            div.innerHTML = `
              <div>
                <div class="font-medium">${s.motivo}</div>
                <div class="text-[11px] text-slate-400">
                  ${s.formadorNombre}
                </div>
              </div>

              <button class="px-3 py-1 bg-emerald-600 rounded-full text-xs"
                onclick="window.marcarDevuelto('${s.id}','${s.equipoId}')">
                Devuelto
              </button>
            `;

            listaPrestados.appendChild(div);
          }
        });
      });
    }

    function escucharEquiposAdmin() {
      onSnapshot(collection(db, "equipos"), (snap) => {

        listaEquipos.innerHTML = "";

        snap.docs.forEach(d => {
          const e = d.data();
          const div = document.createElement("div");

          div.className = "border border-slate-700 rounded px-3 py-2 flex justify-between";

          div.innerHTML = `
            ${e.tipo} — ${e.nombre} (${e.serie})
            <span class="text-[10px] text-slate-400">${e.estado}</span>
          `;

          listaEquipos.appendChild(div);
        });
      });
    }

    // ---------------------
    // ADMIN GLOBAL FUNCTIONS
    // ---------------------
    window.aprobarSolicitud = async (solId, equipoId) => {
      await updateDoc(doc(db, "solicitudes", solId), { estado: "entregado" });
      await updateDoc(doc(db, "equipos", equipoId), { estado: "prestado" });
    };

    window.marcarDevuelto = async (solId, equipoId) => {
      await updateDoc(doc(db, "solicitudes", solId), { estado: "devuelto" });
      await updateDoc(doc(db, "equipos", equipoId), { estado: "disponible" });
    };

    // ---------------------
    // LIMPIAR DUPLICADOS POR SERIE
    // ---------------------
    window.limpiarDuplicados = async () => {

      const equiposSnap = await getDocs(collection(db, "equipos"));
      const solicitudesSnap = await getDocs(collection(db, "solicitudes"));

      // Agrupar por serie
      const mapa = {};
      equiposSnap.docs.forEach(d => {
        const e = d.data();
        if (!mapa[e.serie]) mapa[e.serie] = [];
        mapa[e.serie].push({ id: d.id, ...e });
      });

      let eliminados = 0;

      for (const serie in mapa) {
        const lista = mapa[serie];
        if (lista.length <= 1) continue;

        const original = lista[0];
        const duplicados = lista.slice(1);

        for (const dup of duplicados) {

          solicitudesSnap.docs.forEach(async sol => {
            if (sol.data().equipoId === dup.id) {
              await updateDoc(doc(db, "solicitudes", sol.id), {
                equipoId: original.id
              });
            }
          });

          await deleteDoc(doc(db, "equipos", dup.id));
          eliminados++;
        }
      }

      alert("✔ Duplicados eliminados: " + eliminados);
    };

  </script>

</body>
</html>
